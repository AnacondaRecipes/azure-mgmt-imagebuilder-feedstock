{% set name = "azure-mgmt-imagebuilder" %}
{% set version = "1.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3f325d688b6125c2fa92681e5b18ea407ba032d5be3f7c0724406d733e6c14ef

build:
  number: 1
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<37]

requirements:
  host:
    - setuptools
    - wheel
    - python
    - pip
  run:
    - python
    - isodate >=0.6.1,<1.0.0
    - azure-common >=1.1,<2
    - azure-mgmt-core >=1.3.2,<2.0.0
    - typing-extensions >=4.3.0 # [py<38]

test:
  imports:
    - azure.mgmt.imagebuilder
    - azure.mgmt.imagebuilder.aio
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Azure/azure-sdk-for-python
  summary: Microsoft Azure Image Builder Client Library for Python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  description: |
    This is the Microsoft Azure Image Builder Management Client Library.
  doc_url: https://github.com/Azure/azure-sdk-for-python
  dev_url: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
